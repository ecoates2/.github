# Drop this into each publishable repo at .github/workflows/release-plz.yml.
name: Release-plz

on:
  push:
    branches: [main]

# The called workflow's jobs need to write tags/releases and open the Release
# PR. A reusable workflow can only ever be granted permissions the CALLER also
# grants, so these must be set here (not just inside the reusable workflow).
permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    uses: ecoates2/.github/.github/workflows/release-plz.yml@v1
    with:
      owner-guard: ecoates2
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
